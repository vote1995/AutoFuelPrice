name: Fuel Price Check

on:
  push:
    branches: [main, master]
  schedule:
    # 18:00 and 20:00 Asia/Bangkok (UTC+7) = 11:00 and 13:00 UTC
    - cron: "0 11,13 * * *"
  workflow_dispatch: # Manual trigger from GitHub Actions UI

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Restore dedup state
        uses: actions/cache/restore@v4
        with:
          path: last_fuel_prices.json
          key: fuel-price-state-v2-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            fuel-price-state-v2-

      - name: Run fuel price check
        env:
          STATE_FILE: last_fuel_prices.json
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
          RUN_ONCE: "1"
        run: cargo run --release

      - name: Save dedup state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: last_fuel_prices.json
          key: fuel-price-state-v2-${{ github.run_id }}-${{ github.run_attempt }}
